<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TALK TO GAIA - GIVE THE UNIVERSE A VOICE</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --surface: rgba(10, 10, 10, 0.75);
      --surface-hover: rgba(22, 22, 22, 0.85);
      --border: #2a2a2a;
      --border-hover: #ffffff;
      --accent: #ffffff;
      --accent2: #aaaaaa;
      --text: #ffffff;
      --muted: #888888;
      --radius: 20px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('background.webp') center center / cover no-repeat;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      position: relative;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 40px 24px 28px;
      flex-shrink: 0;
      position: relative;
    }


    header .eyebrow {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    header h1 {
      font-family: 'Clash Display', 'HalenoirText-Medium', system-ui, sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      white-space: nowrap;
      margin-left: auto;
      margin-right: auto;
    }

    .subtitle-short { display: none; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 28px 80px;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      align-content: start;
    }

    .grid::-webkit-scrollbar { display: none; }

    .card { grid-column: span 3; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 16px 20px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--avatar-url);
      background-size: cover;
      background-position: center;
      filter: grayscale(100%);
      opacity: 0.07;
      border-radius: var(--radius);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: var(--radius);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--border-hover);
      box-shadow: 0 16px 48px rgba(255, 255, 255, 0.07);
      background: var(--surface-hover);
    }

    .card:hover::after { opacity: 1; }

    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
    }

    .avatar-wrap img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
      display: block;
      background: #1e1e2e;
    }

    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      background: #ffffff;
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .card h3 {
      font-family: 'Clash Display', 'HalenoirText-Medium', system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .card .role {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .author-btn {
      margin-top: auto;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.65rem;
      font-weight: 300;
      color: #555;
      letter-spacing: 0.06em;
      cursor: default;
      pointer-events: none;
    }

    .card .tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid #333;
      border-radius: 30px;
      padding: 3px 10px;
      margin-bottom: 18px;
    }


    /* ── Logo ── */
    #siteLogo {
      position: fixed;
      top: 20px;
      right: 24px;
      height: 34px;
      width: auto;
      object-fit: contain;
      z-index: 100;
      opacity: 0.9;
    }

    /* ── Page content wrapper ── */
    #pageContent {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      transition: filter 0.7s ease, opacity 0.7s ease;
    }

    #pageContent.in-call {
      filter: grayscale(1) brightness(0.18);
      opacity: 0.7;
      pointer-events: none;
    }

    /* Footer */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      font-size: 0.72rem;
      color: #444;
      flex-shrink: 0;
    }

    footer .footer-left,
    footer .footer-right {
      flex: 1;
    }

    footer .footer-right {
      text-align: right;
    }

    footer .footer-center {
      text-align: center;
      flex: 0 0 auto;
    }

    footer a {
      color: #555;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── Call widget ── */
    #callWidget {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 40px;
    }

    #callWidget::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('title.webp') center center / contain no-repeat;
      opacity: 0.07;
      pointer-events: none;
    }

    #callWidget.active {
      display: flex;
    }

    #callCard {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #callAvatarWrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 8px;
    }

    #callWidgetAvatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
      display: block;
    }

    #callRing {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #callRing.speaking {
      opacity: 1;
      animation: ring 1.4s ease-in-out infinite;
    }

    @keyframes ring {
      0%, 100% { transform: scale(1); border-color: rgba(74, 222, 128, 0.6); }
      50% { transform: scale(1.06); border-color: rgba(74, 222, 128, 0.2); }
    }

    #callWidgetName {
      font-family: 'Clash Display', 'HalenoirText-Medium', system-ui, sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }

    #callWidgetMode {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 1.2em;
    }

    #callWidgetMode.speaking {
      color: #4ade80;
    }

    #endCallBtn {
      margin-top: 12px;
      background: #e53e3e;
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.15s;
    }

    #endCallBtn:hover { background: #c53030; transform: scale(1.05); }

    #endCallBtn svg {
      width: 16px;
      height: 16px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ── Medium screens (narrowed browser or tablet) ── */
    @media (max-width: 900px) {
      html, body { overflow: auto; height: auto; }
      #pageContent { overflow: visible; flex: none; }
      .grid {
        overflow-y: visible;
        flex: none;
        grid-template-columns: repeat(4, 1fr);
        padding: 16px 20px 40px;
      }
      .card { grid-column: span 1; }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      #siteLogo {
        position: fixed;
        top: 12px;
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        height: 26px;
      }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px 16px 32px; }
      header { padding: 56px 16px 16px; }
      .subtitle-full { display: none; }
      .subtitle-short { display: inline; }
      footer { display: none; }
      #callWidgetAvatar, #callAvatarWrap { width: 110px; height: 110px; }
      #callWidgetName { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- ══════════ LOGO ══════════ -->
  <img id="siteLogo" src="logo.webp" alt="SNM PJATK" />

  <!-- ══════════ PAGE CONTENT (dimmed during call) ══════════ -->
  <div id="pageContent">
    <header>
      <p class="eyebrow">MARCH 16–20 — Interactive Week 2026</p>
      <h1>TALK TO GAIA - GIVE THE UNIVERSE A VOICE</h1>
      <p><span class="subtitle-full">Choose your signal. Tune into the cosmos. Let GAIA speak through you.</span><span class="subtitle-short">Choose your signal:</span></p>
    </header>

    <main class="grid" id="agentsGrid"></main>

    <footer>
      <span class="footer-left">ASTROPHYSICISTS: Łukasz Wyrzykowski, Milena Ratajczak, Konstancja Satalecka</span>
      <span class="footer-center">powered by <a href="https://elevenlabs.io" target="_blank" rel="noopener">ElevenAgents</a></span>
      <span class="footer-right">Kamil Soldacki</span>
    </footer>
  </div>

  <!-- ══════════ CALL WIDGET ══════════ -->
  <div id="callWidget">
    <div id="callCard">
      <div id="callAvatarWrap">
        <img id="callWidgetAvatar" src="" alt="" />
        <div id="callRing"></div>
      </div>
      <h2 id="callWidgetName"></h2>
      <p id="callWidgetMode">Connecting…</p>
      <button id="endCallBtn" title="End call">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        End call
      </button>
    </div>
  </div>

  <script type="module">
    import { Conversation } from 'https://esm.sh/@11labs/client';

    // ══════════════════════════════════════════════════════
    //  AGENTS DATA
    // ══════════════════════════════════════════════════════
    const agents = [
      {
        name: "NOSE-IT-ALL",
        role: "An ancient sentient nose adrift since before the first stars",
        student: "Nourhan Gomaa",
        btnLabel: "Inhale the cosmos",
        agentId: "agent_0101kkxfbtk6fcnbyc3jzz3339fv",
        avatar: "avatars/nose-it-all.webp"
      },
      {
        name: "Amanda Ripley-McClaren",
        role: "Hunted by xenomorphs on a stranded spaceship",
        student: "Ege Eroglu",
        agentId: "agent_7101km2yjy7pfvrag41h1gea0ywk",
        avatar: "avatars/amanda.webp"
      },
      {
        name: "Zwezdochot",
        role: "An ancient wizard passionate about space",
        student: "Roza-Maria Bulat<br>Vasilisa Yeliseyeva",
        agentId: "agent_2701kkxfwrc8fp1btwx5068cgd11",
        avatar: "avatars/zwezdochot.webp"
      },
      {
        name: "Cosmo",
        role: "An alien curious about your planet",
        student: "Anastasiia Sliusar",
        agentId: "agent_9401kkxh4rbtfe38m89wsk2seczx",
        avatar: "avatars/cosmo.webp"
      },
      {
        name: "Zuna",
        role: "Friendly, energetic galactic space enthusiast",
        student: "Zuzanna Gocławska<br>Natalia Ślusarska",
        agentId: "agent_3501km2ynf1vepw9t8q6ky8gq4jr",
        avatar: "avatars/zuna.webp"
      },
      {
        name: "Monika",
        role: "A curious Gen Z alien girl observing Earth for the first time",
        student: "Maryia Brukhanczyk<br>Lizaveta Hladziy<br>Mykyta Muliarchuk",
        agentId: "agent_0701km30p2n6fxqrs38w6tt61j8a",
        avatar: "avatars/monika.webp"
      },
      {
        name: "GAIA",
        role: "An all-knowing celestial grandmother guiding you into the unknown",
        student: "Agnieszka Wacławik",
        agentId: "agent_3301km19jhrrftkamd3r0fjem55s",
        avatar: "avatars/gaia.webp"
      },
      {
        name: "Soren",
        role: "A calm, magnetic cosmic guide shaped by solitude among the stars",
        student: "Aleksandra Ciesielska",
        agentId: "agent_8901kkxfefz3f579y016xvcrv243",
        avatar: "avatars/soren.webp"
      }
    ];

    // ══════════════════════════════════════════════════════
    //  CALL STATE
    // ══════════════════════════════════════════════════════
    let activeConversation = null;

    const pageContent     = document.getElementById('pageContent');
    const callWidget      = document.getElementById('callWidget');
    const callWidgetAvatar = document.getElementById('callWidgetAvatar');
    const callWidgetName  = document.getElementById('callWidgetName');
    const callWidgetMode  = document.getElementById('callWidgetMode');
    const callRing        = document.getElementById('callRing');
    const endCallBtn      = document.getElementById('endCallBtn');

    async function startCall(agent) {
      if (activeConversation) await stopCall();

      callWidgetAvatar.src      = agent.avatar;
      callWidgetName.textContent = agent.name;
      callWidgetMode.textContent = 'Connecting…';
      callWidgetMode.className   = '';
      callRing.className         = '';

      pageContent.classList.add('in-call');
      callWidget.classList.add('active');

      try {
        activeConversation = await Conversation.startSession({
          agentId: agent.agentId,
          onConnect: () => {
            callWidgetMode.textContent = 'Listening…';
          },
          onDisconnect: () => {
            stopCall();
          },
          onError: (err) => {
            console.error(err);
            stopCall();
          },
          onModeChange: ({ mode }) => {
            if (mode === 'speaking') {
              callWidgetMode.textContent = 'Speaking…';
              callWidgetMode.className = 'speaking';
              callRing.className = 'speaking';
            } else {
              callWidgetMode.textContent = 'Listening…';
              callWidgetMode.className = '';
              callRing.className = '';
            }
          }
        });
      } catch (err) {
        console.error('Failed to start call:', err);
        stopCall();
      }
    }

    async function stopCall() {
      if (activeConversation) {
        await activeConversation.endSession();
        activeConversation = null;
      }
      pageContent.classList.remove('in-call');
      callWidget.classList.remove('active');
    }

    endCallBtn.addEventListener('click', stopCall);

    // ══════════════════════════════════════════════════════
    //  RENDER CARDS
    // ══════════════════════════════════════════════════════
    for (let i = agents.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [agents[i], agents[j]] = [agents[j], agents[i]];
    }

    const grid = document.getElementById('agentsGrid');

    agents.forEach(agent => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--avatar-url', `url(${agent.avatar})`);
      card.innerHTML = `
        <div class="avatar-wrap">
          <img src="${agent.avatar}" alt="${agent.name}" />
          <span class="status-dot" title="Online"></span>
        </div>
        <h3>${agent.name}</h3>
        <p class="role">${agent.role}</p>
        ${agent.student
          ? `<button class="author-btn">${agent.student}</button>`
          : `<button class="author-btn" style="visibility:hidden">·</button>`
        }
      `;
      card.addEventListener('click', () => startCall(agent));
      grid.appendChild(card);
    });
  </script>

</body>
</html>
