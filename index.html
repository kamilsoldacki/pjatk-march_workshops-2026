<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAIA 2026 — AI Agents</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --surface: #0e0e0e;
      --surface-hover: #1a1a1a;
      --border: #2a2a2a;
      --border-hover: #ffffff;
      --accent: #ffffff;
      --accent2: #aaaaaa;
      --text: #ffffff;
      --muted: #888888;
      --radius: 20px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 40px 24px 28px;
      flex-shrink: 0;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: #ffffff;
      margin: 18px auto 0;
    }

    header .eyebrow {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    header p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 28px 80px;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      align-content: start;
    }

    .grid::-webkit-scrollbar { display: none; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 16px 20px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--border-hover);
      box-shadow: 0 16px 48px rgba(255, 255, 255, 0.07);
      background: var(--surface-hover);
    }

    .card:hover::before { opacity: 1; }

    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
    }

    .avatar-wrap img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
      display: block;
      background: #1e1e2e;
    }

    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      background: #ffffff;
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .card .role {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .card .student-name {
      margin-top: 8px;
      font-size: 0.68rem;
      font-weight: 300;
      color: #555;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .card .tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid #333;
      border-radius: 30px;
      padding: 3px 10px;
      margin-bottom: 18px;
    }

    .card .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 30px;
      padding: 10px 24px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .card .btn:hover {
      opacity: 0.85;
      transform: scale(1.03);
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Modal Overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 100%;
      max-width: 460px;
      padding: 36px 32px 32px;
      position: relative;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: 1px solid #333;
      color: var(--muted);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .modal-close:hover {
      border-color: #ffffff;
      color: var(--text);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .modal-header img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
      flex-shrink: 0;
    }

    .modal-header .info h2 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .modal-header .info p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .modal-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 24px;
    }

    /* ElevenLabs widget container */
    .widget-container {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .widget-container elevenlabs-convai {
      width: 100%;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 12px 20px;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    footer a {
      color: #ffffff;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── Call bar ── */
    #callBar {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 1px solid #333;
      border-radius: 60px;
      padding: 12px 20px 12px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 300;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transition: bottom 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    #callBar.active { bottom: 28px; }

    #callBarAvatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid #fff;
      object-fit: cover;
      flex-shrink: 0;
    }

    #callBarInfo { display: flex; flex-direction: column; line-height: 1.2; }

    #callBarName { font-size: 0.88rem; font-weight: 700; color: #fff; }

    #callBarMode {
      font-size: 0.72rem;
      color: var(--muted);
      min-width: 90px;
    }

    #callBarMode.speaking { color: #4ade80; }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }

    #endCallBtn {
      background: #e53e3e;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    #endCallBtn:hover { background: #c53030; transform: scale(1.08); }

    #endCallBtn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .card.calling {
      border-color: #4ade80;
      box-shadow: 0 0 24px rgba(74, 222, 128, 0.2);
    }

    @media (max-width: 480px) {
      .grid { padding: 12px 16px 80px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      header { padding: 24px 16px 20px; }
    }
  </style>
</head>
<body>

  <!-- ══════════ HEADER ══════════ -->
  <header>
    <p class="eyebrow">GAIA 2026 — Interactive Week</p>
    <h1>TALK TO GAIA — GIVE THE UNIVERSE A VOICE</h1>
    <p>Choose your signal. Tune into the cosmos. Let GAIA speak through you.</p>
  </header>

  <!-- ══════════ AGENTS GRID ══════════ -->
  <main class="grid" id="agentsGrid"></main>

  <!-- ══════════ CALL BAR ══════════ -->
  <div id="callBar">
    <img id="callBarAvatar" src="" alt="" />
    <span class="pulse-dot"></span>
    <div id="callBarInfo">
      <span id="callBarName"></span>
      <span id="callBarMode">Connecting…</span>
    </div>
    <button id="endCallBtn" title="End call">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
    </button>
  </div>

  <footer>
    Powered by <a href="https://elevenlabs.io" target="_blank" rel="noopener">ElevenAgents</a>
  </footer>

  <script type="module">
    import { Conversation } from 'https://esm.sh/@11labs/client';

    // ══════════════════════════════════════════════════════
    //  AGENTS DATA
    // ══════════════════════════════════════════════════════
    const agents = [
      {
        name: "NOSE-IT-ALL",
        role: "Pre-stellar cosmic nose",
        student: "Nourhan Gomaa",
        agentId: "agent_0101kkxfbtk6fcnbyc3jzz3339fv",
        avatar: "avatars/nose-it-all.webp"
      },
      {
        name: "Sophie Chen",
        role: "HR Assistant",
        agentId: "AGENT_ID_2",
        avatar: "https://api.dicebear.com/8.x/avataaars/svg?seed=Sophie&backgroundColor=d1f4e0"
      },
      {
        name: "Marco Rossi",
        role: "Medical Advisor",
        agentId: "AGENT_ID_3",
        avatar: "https://api.dicebear.com/8.x/avataaars/svg?seed=Marco&backgroundColor=ffd5dc"
      },
      {
        name: "Lena Schmidt",
        role: "Legal Assistant",
        agentId: "AGENT_ID_4",
        avatar: "https://api.dicebear.com/8.x/avataaars/svg?seed=Lena&backgroundColor=c0aede"
      },
      {
        name: "James Okafor",
        role: "Financial Advisor",
        agentId: "AGENT_ID_5",
        avatar: "https://api.dicebear.com/8.x/avataaars/svg?seed=James&backgroundColor=ffdfbf"
      },
      {
        name: "Nina Patel",
        role: "Mental Health Support",
        agentId: "AGENT_ID_6",
        avatar: "https://api.dicebear.com/8.x/avataaars/svg?seed=Nina&backgroundColor=b6e3f4"
      },
      {
        name: "Ege",
        role: "AI Agent",
        agentId: "agent_7101km2yjy7pfvrag41h1gea0ywk",
        avatar: "https://api.dicebear.com/8.x/avataaars/svg?seed=Ege&backgroundColor=fde68a"
      }
    ];

    // ══════════════════════════════════════════════════════
    //  CALL STATE
    // ══════════════════════════════════════════════════════
    let activeConversation = null;
    let activeCard = null;

    const callBar     = document.getElementById('callBar');
    const callAvatar  = document.getElementById('callBarAvatar');
    const callName    = document.getElementById('callBarName');
    const callMode    = document.getElementById('callBarMode');
    const endCallBtn  = document.getElementById('endCallBtn');

    async function startCall(agent, card) {
      if (activeConversation) await stopCall();

      callAvatar.src      = agent.avatar;
      callName.textContent = agent.name;
      callMode.textContent = 'Connecting…';
      callMode.className   = '';
      callBar.classList.add('active');
      activeCard = card;
      card.classList.add('calling');

      try {
        activeConversation = await Conversation.startSession({
          agentId: agent.agentId,
          onConnect: () => {
            callMode.textContent = 'Listening…';
          },
          onDisconnect: () => {
            stopCall();
          },
          onError: (err) => {
            console.error(err);
            stopCall();
          },
          onModeChange: ({ mode }) => {
            if (mode === 'speaking') {
              callMode.textContent = 'Speaking…';
              callMode.className = 'speaking';
            } else {
              callMode.textContent = 'Listening…';
              callMode.className = '';
            }
          }
        });
      } catch (err) {
        console.error('Failed to start call:', err);
        stopCall();
      }
    }

    async function stopCall() {
      if (activeConversation) {
        await activeConversation.endSession();
        activeConversation = null;
      }
      callBar.classList.remove('active');
      if (activeCard) { activeCard.classList.remove('calling'); activeCard = null; }
    }

    endCallBtn.addEventListener('click', stopCall);

    // ══════════════════════════════════════════════════════
    //  RENDER CARDS
    // ══════════════════════════════════════════════════════
    const grid = document.getElementById('agentsGrid');

    agents.forEach(agent => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="avatar-wrap">
          <img src="${agent.avatar}" alt="${agent.name}" />
          <span class="status-dot" title="Online"></span>
        </div>
        <h3>${agent.name}</h3>
        <p class="role">${agent.role}</p>
        <button class="btn">
          <svg class="btn-icon" viewBox="0 0 24 24">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          Talk now
        </button>
        ${agent.student ? `<p class="student-name">${agent.student}</p>` : '<p class="student-name" style="visibility:hidden">·</p>'}
      `;
      const handler = e => { e.stopPropagation(); startCall(agent, card); };
      card.querySelector('.btn').addEventListener('click', handler);
      card.addEventListener('click', handler);
      grid.appendChild(card);
    });
  </script>

</body>
</html>
